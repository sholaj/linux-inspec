---
# Setup tasks for MSSQL InSpec role
# Control files are copied ONCE per version to a fixed path, then reused
# This avoids redundant copies when scanning multiple hosts

# Resolve controls path: requirements role (new) or embedded files (legacy fallback)
- name: Resolve controls role path
  ansible.builtin.set_fact:
    _controls_role_path: >-
      {{ inspec_controls_role_path
         | default(
             (lookup('env', 'AWX_PRIVATE_DATA_DIR') + '/requirements_roles/cis/cis')
             if lookup('env', 'AWX_PRIVATE_DATA_DIR') != ''
             else (playbook_dir + '/../requirements_roles/cis/cis')
           )
      }}

- name: Discover MSSQL profile in requirements role
  # Globs the profile folder by major-version prefix so the role is
  # agnostic to the CIS-benchmark suffix (e.g. -1.0.0-1, -1.6.0-1).
  ansible.builtin.set_fact:
    _requirements_profile_candidates: >-
      {{ query('ansible.builtin.fileglob',
               _controls_role_path + '/files/profiles/ssc-cis-mssql' + mssql_version | string + '-*/inspec.yml') }}

- name: Set control paths
  ansible.builtin.set_fact:
    _local_controls_path: >-
      {{ (_requirements_profile_candidates | first | dirname)
         if (_requirements_profile_candidates | length) > 0
         else role_path + '/files/MSSQL' + mssql_version + '_ruby' }}
    _remote_controls_path: "/tmp/inspec_mssql_{{ mssql_version }}"

# Extract CIS benchmark version from profile metadata
- name: Read InSpec profile metadata
  ansible.builtin.slurp:
    src: "{{ _local_controls_path }}/inspec.yml"
  register: _inspec_profile_raw
  delegate_to: localhost

- name: Extract CIS benchmark version
  ansible.builtin.set_fact:
    _cis_benchmark_version: "{{ (_inspec_profile_raw.content | b64decode | regex_search('CIS Benchmark Version (v[\\d.]+)', '\\1')) | default(['Not specified'], true) | first }}"
    _inspec_profile_name: "{{ (_inspec_profile_raw.content | b64decode | from_yaml).name | default('unknown') }}"
    _inspec_profile_version: "{{ (_inspec_profile_raw.content | b64decode | from_yaml).version | default('unknown') }}"

- name: Display CIS benchmark version
  ansible.builtin.debug:
    msg: |
      ╔══════════════════════════════════════════════════════════════════╗
      ║  MSSQL InSpec Compliance Scan                                    ║
      ╠══════════════════════════════════════════════════════════════════╣
      ║  Server:          {{ mssql_server }}:{{ mssql_port }}
      ║  Database:        {{ mssql_database }}
      ║  MSSQL Version:   {{ mssql_version }}
      ║  Profile:         {{ _inspec_profile_name }} v{{ _inspec_profile_version }}
      ║  CIS Benchmark:   {{ _cis_benchmark_version }}
      ╚══════════════════════════════════════════════════════════════════╝

# Create results directory on execution host
- name: Create results directory
  ansible.builtin.file:
    path: "{{ inspec_results_dir }}"
    state: directory
    mode: "0755"
  delegate_to: "{{ _delegate_host }}"

# Check if controls already exist on delegate (skip copy if present)
- name: Check if controls already copied
  ansible.builtin.stat:
    path: "{{ _remote_controls_path }}/inspec.yml"
  register: _controls_exist
  delegate_to: "{{ _delegate_host }}"

# Only copy controls if not already present
- name: Copy controls to delegate (once per version)
  when: not _controls_exist.stat.exists
  block:
    - name: Find control files for MSSQL version
      ansible.builtin.find:
        paths: "{{ _local_controls_path }}"
        patterns: "*.rb"
        recurse: true
      register: _control_files_found
      delegate_to: localhost

    - name: Validate control files exist
      ansible.builtin.fail:
        msg: "No control files found in {{ _local_controls_path }}"
      when: _control_files_found.files | length == 0

    - name: Create controls directory on delegate
      ansible.builtin.file:
        path: "{{ _remote_controls_path }}/controls"
        state: directory
        mode: "0755"
      delegate_to: "{{ _delegate_host }}"

    - name: Copy inspec.yml profile metadata
      ansible.builtin.copy:
        src: "{{ _local_controls_path }}/inspec.yml"
        dest: "{{ _remote_controls_path }}/inspec.yml"
        mode: "0644"
      delegate_to: "{{ _delegate_host }}"

    - name: Copy control files to delegate
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ _remote_controls_path }}/controls/"
        mode: "0644"
      loop: "{{ _control_files_found.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      delegate_to: "{{ _delegate_host }}"

    - name: Display setup info
      ansible.builtin.debug:
        msg: "Copied {{ _control_files_found.files | length }} control(s) to {{ _remote_controls_path }}"
      when: inspec_debug_mode | default(false) | bool

- name: Display reuse info
  ansible.builtin.debug:
    msg: "Reusing existing controls at {{ _remote_controls_path }}"
  when:
    - _controls_exist.stat.exists
    - inspec_debug_mode | default(false) | bool
