---
# Sybase InSpec Role Default Variables

# Sybase connection defaults
sybase_username: "nist_scan_user"
sybase_port: 5000
sybase_version: "16"
sybase_password: ""  # AAP2 injects via extra vars (single credential for all DBs with RBAC)

# SSH connection settings (legacy - from original NISTv2.ksh script)
# Direct mode (false) is recommended: simpler, fewer dependencies, consistent with MSSQL/Oracle
# SSH mode (true) requires SSH key access + oracle user on every Sybase server
sybase_use_ssh: false
sybase_ssh_user: "oracle"
sybase_ssh_port: 22
sybase_ssh_key_path: "~oracle/.ssh/id_rsa"

# Controls source: path to the imported inspec_cis_database role
# AAP2: auto-resolved from requirements_roles
# Local: ansible-galaxy role install -r requirements.yml -p requirements_roles/
inspec_controls_role_path: ""

# Default paths and directories
base_results_dir: "/tmp/compliance_scans"
sybase_controls_base_dir: "{{ role_path }}/files"

# InSpec execution settings
inspec_command_timeout: 1800  # 30 minutes
inspec_debug_mode: false
generate_summary_report: true
inspec_delegate_host: "localhost"

# Sybase-specific settings
sybase_service_name: "SAP_ASE"
sybase_charset: "iso_1"

# Sybase SSL/TLS Configuration (opt-in)
sybase_ssl_enabled: false
sybase_ssl_port: 1063
sybase_ssl_tls_version: "TLS 1.2"
sybase_ssl_cipher_suites: "TLS_ECDHE_RSA_WITH_AES256_GCM_SHA384"
sybase_ssl_trusted_cert_file: ""   # Source path on controller (required when SSL enabled)
sybase_ssl_trusted_cert_dest: ""   # Auto-selected if empty
sybase_ssl_libtcl_cfg_path: ""     # Auto-selected if empty
sybase_ssl_filter_lib: "libsybfssl64.so"  # SSL filter library (libsybfssl64.so for ASE 16.x)

# Sybase client environment paths
# ================================
# Two sets of paths: one for AAP2 Execution Environment (localhost mode),
# one for on-prem delegate host. The role auto-selects based on _use_delegate.
#
# EE paths: Match the SAP ASE SDK installed in the EE container
sybase_home_ee: "/opt/sybase"
sybase_ocs_ee: "OCS_16_0"
#
# Delegate host paths: Match the Sybase client on the on-prem delegate/bastion
sybase_home_delegate: "/opt/sybase"
sybase_ocs_delegate: "OCS_16_0"
#
# Direct override (takes precedence over EE/delegate selection if set)
sybase_home: ""      # Leave empty for auto-select, or set e.g. "/opt/sybase"
sybase_ocs: ""       # Leave empty for auto-select, or set e.g. "OCS_16_0"
sybase_isql_bin: ""  # Leave empty to auto-detect, or set full path e.g. "/opt/sybase/OCS_16_0/bin/isql"

# Error handling
create_error_reports: true
continue_on_errors: true
cleanup_temp_files: true

# Pre-flight Check Configuration
# ==============================
# Pre-flight checks validate database connectivity before running InSpec scans.
# This prevents wasted time on unreachable databases and provides clear skip reports.
preflight_enabled: true              # Enable/disable pre-flight checks
preflight_port_timeout: 5            # TCP port check timeout (seconds)
preflight_auth_timeout: 10           # Database auth check timeout (seconds)
preflight_continue_on_failure: true  # Continue to next DB if preflight fails (vs fail role)

# ======================
# Execution Timeout
# ======================
# Per-host InSpec command timeout (seconds)
# Note: Batch/concurrency controlled at playbook level (serial) and AAP2 (Job Slicing, Forks)
scan_timeout: 600

# Splunk integration
send_to_splunk: false
splunk_hec_url: ""
splunk_hec_token: ""
splunk_index: "compliance_scans"
