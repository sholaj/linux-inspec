---
# Setup tasks for Sybase InSpec execution
# Control files are copied ONCE per version to a fixed path, then reused

# Resolve controls path: requirements role (new) or embedded files (legacy fallback)
- name: Resolve controls role path
  ansible.builtin.set_fact:
    _controls_role_path: >-
      {{ inspec_controls_role_path
         | default(
             (lookup('env', 'AWX_PRIVATE_DATA_DIR') + '/requirements_roles/cis/cis')
             if lookup('env', 'AWX_PRIVATE_DATA_DIR') != ''
             else (playbook_dir + '/../requirements_roles/cis/cis')
           )
      }}

- name: Discover Sybase profile in requirements role
  # Globs the profile folder by major-version prefix so the role is
  # agnostic to the CIS-benchmark suffix (e.g. -1.0.0-1).
  ansible.builtin.set_fact:
    _requirements_profile_candidates: >-
      {{ query('ansible.builtin.fileglob',
               _controls_role_path + '/files/profiles/ssc-cis-sybase' + sybase_version | string + '-*/inspec.yml') }}

- name: Set control paths for setup
  ansible.builtin.set_fact:
    _local_controls_path: >-
      {{ (_requirements_profile_candidates | first | dirname)
         if (_requirements_profile_candidates | length) > 0
         else role_path + '/files/SYBASE' + sybase_version + '_ruby' }}
    sybase_controls_base_dir: "/tmp/inspec_sybase_{{ sybase_version }}"

- name: Setup Sybase InSpec environment
  block:
    - name: Create Sybase results directory
      ansible.builtin.file:
        path: "{{ inspec_results_dir }}"
        state: directory
        mode: "0755"

    # Check if Sybase SDK is already installed (on-prem environments)
    - name: Check if Sybase environment already exists
      ansible.builtin.stat:
        path: "{{ sybase_environment_base.SYBASE }}/SYBASE.sh"
      register: _sybase_env_exists

    # Only create directory structure and deploy files on fresh environments
    # (e.g. Azure test). On-prem, the SDK is already installed and the
    # Ansible user does not have become/sudo privileges for /opt/sybase.
    - name: Create SAP ASE directory structure
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ sybase_environment_base.SYBASE }}"
        - "{{ sybase_environment_base.SYBASE }}/{{ sybase_environment_base.SYBASE_OCS }}/bin"
        - "{{ sybase_environment_base.SYBASE }}/{{ sybase_environment_base.SYBASE_OCS }}/lib"
      become: true
      when: not _sybase_env_exists.stat.exists

    - name: Deploy SYBASE.sh environment script
      ansible.builtin.template:
        src: SYBASE.sh.j2
        dest: "{{ sybase_environment_base.SYBASE }}/SYBASE.sh"
        mode: "0755"
      become: true
      when: not _sybase_env_exists.stat.exists

    - name: Check if interfaces file exists in SYBASE directory
      ansible.builtin.stat:
        path: "{{ sybase_environment_base.SYBASE }}/interfaces"
      register: _sybase_interfaces_exists

    # Fresh environment (Azure): deploy to SYBASE dir with become
    - name: Deploy Sybase interfaces file (fresh environment)
      ansible.builtin.template:
        src: interfaces.j2
        dest: "{{ sybase_environment_base.SYBASE }}/interfaces"
        mode: "0644"
      become: true
      when:
        - not _sybase_env_exists.stat.exists
        - not _sybase_interfaces_exists.stat.exists

    # On-prem: deploy to user-writable /tmp (no become needed)
    - name: Deploy Sybase interfaces file (user-writable location)
      ansible.builtin.template:
        src: interfaces.j2
        dest: "/tmp/sybase_interfaces"
        mode: "0644"
      when:
        - _sybase_env_exists.stat.exists
        - not _sybase_interfaces_exists.stat.exists

    # Set the interfaces file path for InSpec to use
    - name: Set interfaces file path
      ansible.builtin.set_fact:
        _sybase_interfaces_path: >-
          {%- if _sybase_interfaces_exists.stat.exists -%}
          {{ sybase_environment_base.SYBASE }}/interfaces
          {%- elif _sybase_env_exists.stat.exists -%}
          /tmp/sybase_interfaces
          {%- else -%}
          {{ sybase_environment_base.SYBASE }}/interfaces
          {%- endif -%}

    # SSL/TLS Configuration Deployment
    - name: Deploy SSL configuration files
      when: sybase_ssl_enabled | default(false) | bool
      block:
        - name: Determine SSL file destinations
          ansible.builtin.set_fact:
            _ssl_trusted_cert_dest: >-
              {{ sybase_ssl_trusted_cert_dest if sybase_ssl_trusted_cert_dest | default('') != ''
                 else ('/tmp/sybase_trusted.txt' if _sybase_env_exists.stat.exists
                 else sybase_environment_base.SYBASE + '/' + sybase_environment_base.SYBASE_OCS + '/config/trusted.txt') }}
            _ssl_libtcl_cfg_dest: >-
              {{ sybase_ssl_libtcl_cfg_path if sybase_ssl_libtcl_cfg_path | default('') != ''
                 else sybase_environment_base.SYBASE + '/' + sybase_environment_base.SYBASE_OCS + '/config/libtcl64.cfg' }}

        - name: Create SSL config directory (fresh environment)
          ansible.builtin.file:
            path: "{{ sybase_environment_base.SYBASE }}/{{ sybase_environment_base.SYBASE_OCS }}/config"
            state: directory
            mode: "0755"
          become: true
          when: not _sybase_env_exists.stat.exists

        - name: Deploy trusted certificate file
          ansible.builtin.copy:
            src: "{{ sybase_ssl_trusted_cert_file }}"
            dest: "{{ _ssl_trusted_cert_dest }}"
            mode: "0644"

        - name: Deploy libtcl.cfg SSL driver configuration
          ansible.builtin.template:
            src: libtcl.cfg.j2
            dest: "{{ _ssl_libtcl_cfg_dest }}"
            mode: "0644"

        - name: Display SSL configuration
          ansible.builtin.debug:
            msg: |
              SSL Configuration Deployed
              ========================
              Trusted cert: {{ _ssl_trusted_cert_dest }}
              libtcl.cfg: {{ _ssl_libtcl_cfg_dest }}
              Cipher: {{ sybase_ssl_cipher_suites }}
          when: inspec_debug_mode | default(false) | bool

    # Check if controls already exist (skip copy if present)
    - name: Check if controls already copied
      ansible.builtin.stat:
        path: "{{ sybase_controls_base_dir }}/SYBASE{{ sybase_version }}_ruby/inspec.yml"
      register: _controls_exist

    # Only copy controls if not already present
    - name: Copy controls to delegate (once per version)
      when: not _controls_exist.stat.exists
      block:
        - name: Create Sybase controls directory
          ansible.builtin.file:
            path: "{{ sybase_controls_base_dir }}/SYBASE{{ sybase_version }}_ruby"
            state: directory
            mode: "0755"

        - name: Copy Sybase control files
          ansible.builtin.copy:
            src: "{{ _local_controls_path }}/"
            dest: "{{ sybase_controls_base_dir }}/SYBASE{{ sybase_version }}_ruby/"
            mode: "0644"

        - name: Display setup info
          ansible.builtin.debug:
            msg: "Copied controls to {{ sybase_controls_base_dir }}"
          when: inspec_debug_mode | default(false) | bool

    - name: Set Sybase InSpec profile path
      ansible.builtin.set_fact:
        sybase_profile_path: "{{ sybase_controls_base_dir }}/SYBASE{{ sybase_version }}_ruby"

    - name: Verify Sybase InSpec profile exists
      ansible.builtin.stat:
        path: "{{ sybase_profile_path }}/inspec.yml"
      register: sybase_profile_check

    - name: Display Sybase profile to be executed
      ansible.builtin.debug:
        msg: |
          Sybase {{ sybase_version }} InSpec Profile
          =========================================
          Profile path: {{ sybase_profile_path }}
          SSH Mode: {{ sybase_use_ssh | default(false) | ternary('Enabled', 'Direct') }}
      when: inspec_debug_mode | default(false) | bool

    - name: Fail if Sybase InSpec profile not found
      ansible.builtin.fail:
        msg: "Sybase InSpec profile not found at {{ sybase_profile_path }}"
      when: not sybase_profile_check.stat.exists
  delegate_to: "{{ _delegate_host }}"
