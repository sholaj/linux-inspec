---
# InSpec execution tasks for Sybase
# ==================================
# Routes to appropriate execution mode based on sybase_use_ssh variable.
# Supports both direct (isql over network) and SSH (legacy) modes.
#
# Prerequisites:
#   - _delegate_host is set (to inspec_delegate_host or inventory_hostname)
#   - preflight_passed is true
#   - sybase_profile_path is set (control files copied to delegate)

# Determine connection mode
- name: "[Execute] Determine connection mode"
  ansible.builtin.set_fact:
    _connection_mode: "{{ 'ssh' if (sybase_use_ssh | default(false) | bool) else 'direct' }}"

- name: "[Execute] Display execution mode"
  ansible.builtin.debug:
    msg: |
      Execution Mode: {{ _connection_mode | upper }}
      Delegate Host: {{ _delegate_host }}
      Sybase Target: {{ sybase_server }}:{{ sybase_port }}/{{ sybase_service }}
  when: inspec_debug_mode | default(false) | bool

- name: "[Execute] Gather environment facts"
  ansible.builtin.setup:
    gather_subset:
      - env
  delegate_to: "{{ _delegate_host }}"
  delegate_facts: true

- name: "[Execute] Set target environment"
  ansible.builtin.set_fact:
    _target_env: "{{ hostvars[_delegate_host].ansible_env | default({'PATH': '', 'LD_LIBRARY_PATH': ''}) }}"

- name: "[Execute] Get system PATH from delegate"
  ansible.builtin.shell: echo "$PATH"
  register: delegate_system_path
  changed_when: false
  delegate_to: "{{ _delegate_host }}"
  when: not (_target_env.PATH | default('')) or (_target_env.PATH | default('')) == ''

- name: "[Execute] Update target environment with system PATH"
  ansible.builtin.set_fact:
    _target_env: "{{ _target_env | combine({'PATH': delegate_system_path.stdout}) }}"
  when: delegate_system_path.stdout is defined

- name: "[Execute] Build environment variables"
  ansible.builtin.set_fact:
    sybase_environment:
      PATH: "{{ sybase_environment_base.PATH }}{% if _target_env.PATH | default('') %}:{{ _target_env.PATH }}{% endif %}"
      LD_LIBRARY_PATH: "{{ sybase_environment_base.LD_LIBRARY_PATH }}{% if _target_env.LD_LIBRARY_PATH | default('') %}:{{ _target_env.LD_LIBRARY_PATH }}{% endif %}"
      SYBASE: "{{ sybase_environment_base.SYBASE }}"
      SYBASE_OCS: "{{ sybase_environment_base.SYBASE_OCS }}"
      SSH_AUTH_SOCK: "{{ _target_env.SSH_AUTH_SOCK | default('') }}"

# Route to appropriate execution based on mode
- name: "[Execute] Run SSH-based execution (legacy)"
  ansible.builtin.shell: |
    # Source Sybase environment
    source {{ sybase_environment_base.SYBASE }}/SYBASE.sh
    export CHEF_LICENSE=accept

    inspec exec {{ sybase_profile_path }} \
      -t ssh://'{{ sybase_ssh_user }}'@'{{ sybase_server }}' \
      -i {{ sybase_ssh_key_path }} \
      --input usernm='{{ sybase_username }}' \
              passwd='{{ sybase_password }}' \
              servicenm='{{ sybase_service }}' \
              database='{{ sybase_database | default("master") }}' \
              interfaces_file='{{ _sybase_interfaces_path | default("") }}' \
      --reporter=json-min \
      --no-color
  args:
    executable: /bin/bash
  timeout: "{{ scan_timeout | default(600) }}"
  register: _inspec_ssh_result
  changed_when: false
  failed_when: _inspec_ssh_result.rc not in [0, 100, 101]
  no_log: "{{ not (inspec_debug_mode | default(false)) }}"
  delegate_to: "{{ _delegate_host }}"
  when: _connection_mode == 'ssh'

- name: "[Execute] Run direct execution"
  ansible.builtin.shell: |
    # Source Sybase environment
    source {{ sybase_environment_base.SYBASE }}/SYBASE.sh
    export CHEF_LICENSE=accept

    inspec exec {{ sybase_profile_path }} \
      --input usernm='{{ sybase_username }}' \
              passwd='{{ sybase_password }}' \
              servicenm='{{ sybase_service }}' \
              database='{{ sybase_database | default("master") }}' \
              interfaces_file='{{ _sybase_interfaces_path | default("") }}' \
      --reporter=json-min \
      --no-color
  args:
    executable: /bin/bash
  timeout: "{{ scan_timeout | default(600) }}"
  register: _inspec_direct_result
  changed_when: false
  failed_when: _inspec_direct_result.rc not in [0, 100, 101]
  no_log: "{{ not (inspec_debug_mode | default(false)) }}"
  delegate_to: "{{ _delegate_host }}"
  when: _connection_mode == 'direct'

# Common post-execution tasks
- name: "[Execute] Set results variable"
  ansible.builtin.set_fact:
    inspec_results:
      results:
        - "{{ _inspec_ssh_result if _connection_mode == 'ssh' else _inspec_direct_result }}"

# Parse and display results
# Note: stdout may already be parsed as dict by Jinja2, or may be a string
- name: "[Execute] Parse InSpec results"
  ansible.builtin.set_fact:
    _parsed_results: "{{ _parsed_results | default([]) + [item.stdout if item.stdout is mapping else (item.stdout | from_json)] }}"
  loop: "{{ inspec_results.results | default([]) }}"
  loop_control:
    label: "Result {{ ansible_loop.index }}"
  when: item.stdout is defined and item.stdout != ''
  no_log: true

- name: "[Execute] Display scan summary"
  ansible.builtin.debug:
    msg: |
      ═══════════════════════════════════════════════════════════════════
       Sybase InSpec Compliance Scan Results
       Database: {{ sybase_server }}:{{ sybase_port }}/{{ sybase_service }}
       Mode: {{ _connection_mode | upper }}
      ═══════════════════════════════════════════════════════════════════
      {% set ns = namespace(passed=0, failed=0, total=0) %}
      {% for result in _parsed_results | default([]) %}
      {% for control in result.controls | default([]) %}
      {% set res = control.results | default([]) %}
      {% set status = res[0].status | default(control.status | default('unknown')) %}
      {% set ns.total = ns.total + 1 %}
      {% if status == 'passed' %}{% set ns.passed = ns.passed + 1 %}{% elif status == 'failed' %}{% set ns.failed = ns.failed + 1 %}{% endif %}
      {{ control.id }}: {{ status | upper }} - {{ control.title | default('N/A') | truncate(60) }}
      {% endfor %}
      {% endfor %}
      ───────────────────────────────────────────────────────────────────
       Total: {{ ns.total }} | Passed: {{ ns.passed }} | Failed: {{ ns.failed }}
      ═══════════════════════════════════════════════════════════════════
  when: _parsed_results is defined and (_parsed_results | length) > 0

# Process results for file output
- name: "[Execute] Process InSpec results"
  ansible.builtin.include_tasks: process_results.yml
  loop: "{{ inspec_results.results | default([]) }}"
  loop_control:
    index_var: _result_idx
    label: "Result {{ _result_idx + 1 }}"
  when: inspec_results.results is defined
