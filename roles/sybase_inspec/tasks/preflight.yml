---
# Pre-flight connectivity checks for Sybase InSpec role
# =====================================================
# Validates database connectivity before running InSpec scans.
# Sets facts to skip execution if database is unreachable or auth fails.
# Uses isql (SAP ASE client) or tsql (FreeTDS) for connectivity testing.

- name: Initialize preflight results
  ansible.builtin.set_fact:
    preflight_passed: false
    preflight_skip_reason: ""
    preflight_error_code: ""
    _preflight_port_open: false
    _preflight_auth_valid: false

# Step 1: TCP Port Connectivity Check
- name: Test TCP port connectivity
  ansible.builtin.wait_for:
    host: "{{ sybase_server }}"
    port: "{{ _effective_port }}"
    timeout: "{{ preflight_port_timeout | default(5) }}"
    state: started
  register: _port_check
  ignore_errors: true
  delegate_to: "{{ _delegate_host }}"

- name: Set port connectivity result
  ansible.builtin.set_fact:
    _preflight_port_open: "{{ _port_check is succeeded }}"
    preflight_skip_reason: "{{ 'Connection timeout - port ' ~ _effective_port ~ ' unreachable on ' ~ sybase_server if _port_check is failed else '' }}"
    preflight_error_code: "{{ 'PORT_UNREACHABLE' if _port_check is failed else '' }}"

# Step 2: Authentication Check (only if port is open)
# Tries isql (SAP ASE client) first, falls back to tsql (FreeTDS)
- name: Test database authentication
  ansible.builtin.shell: |
    # Source Sybase environment if available
    if [ -f "{{ sybase_environment_base.SYBASE }}/SYBASE.sh" ]; then
      source {{ sybase_environment_base.SYBASE }}/SYBASE.sh
    fi

    # Try SAP ASE isql first (NOT unixODBC isql which has different syntax)
    ISQL="{{ sybase_isql_bin | default('') }}"
    if [ -z "$ISQL" ]; then
      # Check SAP ASE SDK path first (matches InSpec resource detect_client_type)
      SAP_ISQL="{{ sybase_environment_base.SYBASE }}/{{ sybase_environment_base.SYBASE_OCS }}/bin/isql"
      if [ -x "$SAP_ISQL" ]; then
        ISQL="$SAP_ISQL"
      else
        # Fallback: find isql on PATH but verify it is SAP, not unixODBC.
        # unixODBC isql uses positional DSN syntax; SAP isql uses -S flag.
        CANDIDATE=$(command -v isql 2>/dev/null)
        if [ -n "$CANDIDATE" ]; then
          HELP_OUT=$("$CANDIDATE" --help 2>&1 || true)
          case "$HELP_OUT" in
            *unixODBC*|*ODBC*) ;; # skip unixODBC isql
            *) ISQL="$CANDIDATE" ;;
          esac
        fi
      fi
    fi

    if [ -n "$ISQL" ]; then
      # Create temporary interfaces file so isql can resolve the service name.
      # The permanent interfaces file is created later by setup.yml, but
      # preflight runs first and needs name resolution to work.
      TEMP_IFACES=$(mktemp /tmp/sybase_preflight_interfaces.XXXXXX)
      cat > "$TEMP_IFACES" << 'IFACES_EOF'
    {{ sybase_service }}
    {% if sybase_ssl_enabled | default(false) | bool %}
    	master ssl ether {{ sybase_server }} {{ sybase_ssl_port }}
    	query ssl ether {{ sybase_server }} {{ sybase_ssl_port }}
    {% else %}
    	master tcp ether {{ sybase_server }} {{ sybase_port }}
    	query tcp ether {{ sybase_server }} {{ sybase_port }}
    {% endif %}
    IFACES_EOF

    {% if sybase_ssl_enabled | default(false) | bool %}
      # Create temporary libtcl.cfg for SSL driver config.
      # The permanent file is deployed later by setup.yml.
      TEMP_LIBTCL=$(mktemp /tmp/sybase_preflight_libtcl.XXXXXX)
      cat > "$TEMP_LIBTCL" << 'LIBTCL_EOF'
    [SSL]
    ssl = libsybssl64.so
    CIPHER_SUITE = {{ sybase_ssl_cipher_suites | default('TLS_ECDHE_RSA_WITH_AES256_GCM_SHA384') }}
    LIBTCL_EOF
      export SYBOCS_CFG="$TEMP_LIBTCL"
    {% endif %}

      echo -e "SELECT 1\ngo" | timeout {{ preflight_auth_timeout | default(10) }} "$ISQL" \
        -S '{{ sybase_service }}' \
        -U '{{ sybase_username }}' \
        -P '{{ sybase_password }}' \
        -I "$TEMP_IFACES" \
        -w 200 {% if sybase_ssl_enabled | default(false) | bool %}-X {% endif %}2>&1
      RC=$?
      rm -f "$TEMP_IFACES"
    {% if sybase_ssl_enabled | default(false) | bool %}
      rm -f "$TEMP_LIBTCL"
    {% endif %}
      exit $RC
    fi

    # Fall back to tsql (FreeTDS - for test environments)
    TSQL=$(command -v tsql 2>/dev/null)
    if [ -n "$TSQL" ]; then
      echo -e "SELECT 1\ngo\nquit" | timeout {{ preflight_auth_timeout | default(10) }} "$TSQL" \
        -H '{{ sybase_server }}' \
        -p '{{ sybase_port }}' \
        -U '{{ sybase_username }}' \
        -P '{{ sybase_password }}' 2>&1
      exit $?
    fi

    echo "SYBASE_CLIENT_NOT_FOUND"
    exit 127
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ sybase_environment_base.PATH }}:/usr/local/bin:/usr/bin:/opt/freetds/bin:{{ ansible_env.PATH | default('/usr/bin') }}"
    LD_LIBRARY_PATH: "{{ sybase_environment_base.LD_LIBRARY_PATH | default('') }}"
    SYBASE: "{{ sybase_environment_base.SYBASE }}"
    SYBASE_OCS: "{{ sybase_environment_base.SYBASE_OCS }}"
  register: _auth_check
  ignore_errors: true
  no_log: "{{ not (inspec_debug_mode | default(false)) }}"
  delegate_to: "{{ _delegate_host }}"
  when: _preflight_port_open

- name: Parse authentication result
  ansible.builtin.set_fact:
    _preflight_auth_valid: "{{ _auth_check.rc == 0 if _auth_check is defined and _auth_check.rc is defined else false }}"
    _auth_error_msg: >-
      {%- if _auth_check is skipped -%}
      Port check failed - skipped auth test
      {%- elif _auth_check.rc | default(0) == 127 -%}
      Sybase client not found on execution host (neither isql nor tsql available)
      {%- elif _auth_check.rc | default(0) == 124 -%}
      Authentication timeout after {{ preflight_auth_timeout | default(10) }}s
      {%- elif 'Login failed' in (_auth_check.stdout | default('')) or 'Login incorrect' in (_auth_check.stdout | default('')) -%}
      Invalid username/password
      {%- elif 'CT-LIBRARY error' in (_auth_check.stdout | default('')) and 'connect' in (_auth_check.stdout | default('')) -%}
      isql connection failed (CT-LIBRARY error)
      {%- elif 'Unknown host' in (_auth_check.stdout | default('')) or 'could not connect' in (_auth_check.stdout | default('')) -%}
      Cannot resolve hostname or connect to server
      {%- elif 'Connection refused' in (_auth_check.stdout | default('')) -%}
      Connection refused by server
      {%- elif 'Connection timed out' in (_auth_check.stdout | default('')) -%}
      Connection timed out
      {%- elif 'Adaptive Server is unavailable' in (_auth_check.stdout | default('')) -%}
      Adaptive Server is unavailable or not responding
      {%- elif 'SSL handshake' in (_auth_check.stdout | default('')) or 'ssl handshake' in (_auth_check.stdout | default('')) -%}
      SSL/TLS handshake failed - verify server SSL config and cipher suite
      {%- elif 'certificate' in (_auth_check.stdout | default('')) and 'error' in (_auth_check.stdout | default('')) -%}
      SSL certificate validation failed - check trusted.txt certificate file
      {%- elif 'Server name not found' in (_auth_check.stdout | default('')) or 'interfaces' in (_auth_check.stdout | default('')) -%}
      Server not found in interfaces file - check sybase_service matches interfaces entry
      {%- elif _auth_check.rc | default(0) != 0 -%}
      Database connection failed (exit code: {{ _auth_check.rc | default('unknown') }})
      {%- else -%}
      {%- endif -%}
  when: _preflight_port_open

- name: Set authentication error details
  ansible.builtin.set_fact:
    preflight_skip_reason: "{{ _auth_error_msg }}"
    preflight_error_code: >-
      {%- if _auth_check.rc | default(0) == 127 -%}
      SYBASE_CLIENT_NOT_FOUND
      {%- elif _auth_check.rc | default(0) == 124 -%}
      AUTH_TIMEOUT
      {%- elif 'Login failed' in (_auth_check.stdout | default('')) or 'Login incorrect' in (_auth_check.stdout | default('')) -%}
      AUTH_FAILED
      {%- elif 'CT-LIBRARY error' in (_auth_check.stdout | default('')) -%}
      ISQL_CONNECTION_ERROR
      {%- elif 'Unknown host' in (_auth_check.stdout | default('')) or 'could not connect' in (_auth_check.stdout | default('')) -%}
      HOST_UNREACHABLE
      {%- elif 'Connection refused' in (_auth_check.stdout | default('')) -%}
      CONNECTION_REFUSED
      {%- elif 'Connection timed out' in (_auth_check.stdout | default('')) -%}
      CONNECTION_TIMEOUT
      {%- elif 'Adaptive Server is unavailable' in (_auth_check.stdout | default('')) -%}
      SERVER_UNAVAILABLE
      {%- elif 'SSL handshake' in (_auth_check.stdout | default('')) or 'ssl handshake' in (_auth_check.stdout | default('')) -%}
      SSL_HANDSHAKE_FAILED
      {%- elif 'certificate' in (_auth_check.stdout | default('')) and 'error' in (_auth_check.stdout | default('')) -%}
      SSL_CERT_INVALID
      {%- elif 'Server name not found' in (_auth_check.stdout | default('')) or 'interfaces' in (_auth_check.stdout | default('')) -%}
      INTERFACES_ERROR
      {%- elif _auth_check.rc | default(0) != 0 -%}
      CONNECTION_ERROR
      {%- else -%}
      {%- endif -%}
  when:
    - _preflight_port_open
    - not _preflight_auth_valid

# Step 3: Set final preflight result
- name: Set final preflight status
  ansible.builtin.set_fact:
    preflight_passed: "{{ _preflight_port_open and _preflight_auth_valid }}"

- name: Log preflight success
  ansible.builtin.debug:
    msg: "Preflight PASSED - {{ sybase_server }}:{{ _effective_port }}/{{ sybase_service }} is reachable and authenticated"
  when:
    - preflight_passed
    - inspec_debug_mode | default(false) | bool

- name: Log preflight failure
  ansible.builtin.debug:
    msg: "Preflight FAILED - {{ sybase_server }}:{{ _effective_port }}/{{ sybase_service }} - {{ preflight_skip_reason }} [{{ preflight_error_code }}]"
  when:
    - not preflight_passed
    - inspec_debug_mode | default(false) | bool

# Step 4: Register this database in the scan results tracker
- name: Register database scan attempt
  ansible.builtin.set_fact:
    _db_scan_record:
      host: "{{ sybase_server }}"
      port: "{{ _effective_port }}"
      database: "{{ sybase_database }}"
      service: "{{ sybase_service }}"
      db_type: "sybase"
      version: "{{ sybase_version }}"
      preflight_passed: "{{ preflight_passed }}"
      skip_reason: "{{ preflight_skip_reason }}"
      error_code: "{{ preflight_error_code }}"
      timestamp: "{{ ansible_date_time.iso8601 }}"
      inventory_host: "{{ inventory_hostname }}"
