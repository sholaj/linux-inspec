---
# Process single row from Oracle CMDB CSV export
# Required columns: Name, Version, Validation Status, Comments
# Extracts per-host: oracle_server, oracle_database, oracle_version

# Reset per-row state to prevent stale values from prior iterations
- name: Reset per-row state
  set_fact:
    has_connection_warning: false
    oracle_fqdn: ''
    host_id: ''

- name: Parse Oracle CSV fields
  set_fact:
    fields: "{{ item.split(',') | map('trim') | list }}"

- name: Skip rows with insufficient columns
  when: fields | length < (oracle_col_map.values() | max) + 1
  block:
    - debug:
        msg: "Skipping Oracle row {{ idx + 1 }}: expected at least {{ (oracle_col_map.values() | max) + 1 }} fields, got {{ fields | length }}"
    - set_fact:
        skipped_counts: "{{ skipped_counts | combine({'oracle': skipped_counts.oracle + 1}) }}"

- name: Process Oracle entry
  when: fields | length >= (oracle_col_map.values() | max) + 1
  block:
    - name: Extract Oracle fields
      set_fact:
        raw_name: "{{ fields[oracle_col_map['Name'] | int] }}"
        raw_version: "{{ fields[oracle_col_map['Version'] | int] }}"
        validation_status: "{{ fields[oracle_col_map['Validation Status'] | int] }}"
        comments: "{{ fields[oracle_col_map['Comments'] | int] }}"

    - name: Skip non-validated Oracle entries
      when: "'validated' not in validation_status | lower"
      block:
        - debug:
            msg: "Skipping Oracle row {{ idx + 1 }} ({{ raw_name }}): Validation Status = '{{ validation_status }}'"
        - set_fact:
            skipped_counts: "{{ skipped_counts | combine({'oracle': skipped_counts.oracle + 1}) }}"

    - name: Process validated Oracle entry
      when: "'validated' in validation_status | lower"
      block:
        - name: Parse Oracle Name field (DATABASE@SERVER)
          set_fact:
            oracle_db_name: "{{ raw_name.split('@')[0] }}"
            oracle_fqdn: "{{ raw_name.split('@')[1] | default('') }}"

        - name: Skip entries without valid Name format
          debug:
            msg: "Skipping Oracle row {{ idx + 1 }}: invalid Name format '{{ raw_name }}' (expected DB@SERVER)"
          when: oracle_fqdn | length == 0

        - name: Add Oracle host to inventory
          when: oracle_fqdn | length > 0
          block:
            - name: Map Oracle version
              set_fact:
                oracle_major: "{{ raw_version.split('.')[0] }}"
                oracle_mapped_version: "{{ oracle_version_map[raw_version.split('.')[0]] | default(raw_version.split('.')[0] + 'c') }}"

            - name: Create Oracle host ID
              set_fact:
                host_id: "{{ (oracle_db_name + '_' + oracle_fqdn.split('.')[0]) | replace('.', '_') | replace('-', '_') }}"

            - name: Check for connection warnings
              set_fact:
                has_connection_warning: "{{ 'unable to connect' in (comments | lower) or 'unable to validate' in (comments | lower) }}"

            - name: Track connection issue
              set_fact:
                connection_issues: "{{ connection_issues + ['Oracle: ' + raw_name + ' - ' + comments] }}"
              when: has_connection_warning

            # Uses recursive=true to preserve existing vars and hosts in inventory_data
            - name: Add Oracle host entry
              set_fact:
                inventory_data: "{{ inventory_data | combine({
                  'all': {
                    'children': {
                      'oracle_databases': {
                        'hosts': inventory_data.all.children.oracle_databases.hosts | combine({
                          host_id: host_entry
                        })
                      }
                    }
                  }
                }, recursive=true) }}"
              vars:
                base_entry:
                  oracle_server: "{{ oracle_fqdn }}"
                  oracle_database: "{{ oracle_db_name }}"
                  oracle_version: "{{ oracle_mapped_version }}"
                warning_entry:
                  cmdb_connection_warning: "{{ comments }}"
                host_entry: "{{ base_entry | combine(warning_entry if has_connection_warning else {}) }}"

            - name: Increment Oracle count
              set_fact:
                platform_counts: "{{ platform_counts | combine({'oracle': platform_counts.oracle + 1}) }}"
