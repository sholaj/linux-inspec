---
# Sample Business Unit Inventory - Database Compliance Scanning
# This is a sanitised example showing the inventory structure
# generated by convert_cmdb_to_inventory.yml
#
# Real inventories are generated from CMDB CSV exports and must NOT be committed.
# See: inventory_converter/README.md for usage instructions.
#
# Usage:
#   MSSQL scan:
#     ansible-playbook test_playbooks/run_mssql_inspec.yml \
#       -i inventories/sample_bu_inventory.yml \
#       -e "host_group=mssql_databases" -e "target_bu=sample"
#
#   Oracle scan:
#     ansible-playbook test_playbooks/run_oracle_inspec.yml \
#       -i inventories/sample_bu_inventory.yml \
#       -e "host_group=oracle_databases"

all:
  children:

    # =========================================================================
    # MSSQL Databases (server-level scanning, deduplicated by server:port)
    # =========================================================================
    mssql_databases:
      vars:
        mssql_username: nist_scan_user
        # BU identification - drives SSH tunnel and connectivity logic
        business_unit: "[BU_ID]"
        # Scanning configuration
        ansible_connection: local
        inspec_delegate_host: ""
        inspec_results_dir: /tmp/inspec_mssql_results
        inspec_debug_mode: false
        generate_summary_report: true

      hosts:
        # MSSQL 2019 - Standard Edition
        DBSERVER01_1433:
          mssql_server: "[DB_SERVER].example.internal"
          mssql_port: 1433
          mssql_version: "2019"
          mssql_database: master
          mssql_instance: MSSQLSERVER
          mssql_edition: "Standard Edition (64-bit)"
          database_platform: mssql
          db_server: "[DB_SERVER].example.internal"
          db_port: 1433
          db_version: "2019"

        # MSSQL 2019 - Enterprise Edition
        DBSERVER02_1433:
          mssql_server: "[DB_SERVER].example.internal"
          mssql_port: 1433
          mssql_version: "2019"
          mssql_database: master
          mssql_instance: MSSQLSERVER
          mssql_edition: "Enterprise Edition (64-bit)"
          database_platform: mssql
          db_server: "[DB_SERVER].example.internal"
          db_port: 1433
          db_version: "2019"

        # MSSQL 2022 - Standard Edition
        DBSERVER03_1433:
          mssql_server: "[DB_SERVER].example.internal"
          mssql_port: 1433
          mssql_version: "2022"
          mssql_database: master
          mssql_instance: MSSQLSERVER
          mssql_edition: "Standard Edition (64-bit)"
          database_platform: mssql
          db_server: "[DB_SERVER].example.internal"
          db_port: 1433
          db_version: "2022"

        # MSSQL 2017 - Non-standard port
        DBSERVER04_51525:
          mssql_server: "[DB_SERVER].example.internal"
          mssql_port: 51525
          mssql_version: "2017"
          mssql_database: master
          mssql_instance: NAMED_INSTANCE
          mssql_edition: "Standard Edition (64-bit)"
          database_platform: mssql
          db_server: "[DB_SERVER].example.internal"
          db_port: 51525
          db_version: "2017"

        # MSSQL 2019 - Developer Edition (dev/test environment)
        DEVSERVER01_1433:
          mssql_server: "[DB_SERVER].example.internal"
          mssql_port: 1433
          mssql_version: "2019"
          mssql_database: master
          mssql_instance: MSSQLSERVER
          mssql_edition: "Developer Edition (64-bit)"
          database_platform: mssql
          db_server: "[DB_SERVER].example.internal"
          db_port: 1433
          db_version: "2019"

        # MSSQL with connection warning (included but flagged)
        DBSERVER05_1433:
          mssql_server: "[DB_SERVER].example.internal"
          mssql_port: 1433
          mssql_version: "2019"
          mssql_database: master
          mssql_instance: MSSQLSERVER
          mssql_edition: "Standard Edition (64-bit)"
          database_platform: mssql
          db_server: "[DB_SERVER].example.internal"
          db_port: 1433
          db_version: "2019"
          cmdb_connection_warning: "Unable to connect using Default ID's"

    # =========================================================================
    # Oracle Databases (per-database scanning)
    # =========================================================================
    oracle_databases:
      vars:
        oracle_username: nist_scan_user
        # Scanning configuration
        ansible_connection: local
        inspec_delegate_host: ""
        inspec_results_dir: /tmp/inspec_oracle_results
        inspec_debug_mode: false
        generate_summary_report: true

      hosts:
        # Oracle 19c - CDB
        CDB1_ORASERVER01:
          oracle_server: "[DB_SERVER].example.internal"
          oracle_port: 1521
          oracle_database: CDB1
          oracle_service: CDB1
          oracle_version: "19c"
          database_platform: oracle

        # Oracle 19c - PDB
        APPDB01_ORASERVER01:
          oracle_server: "[DB_SERVER].example.internal"
          oracle_port: 1521
          oracle_database: APPDB01
          oracle_service: APPDB01
          oracle_version: "19c"
          database_platform: oracle

        # Oracle 23c
        DEVDB01_ORASERVER02:
          oracle_server: "[DB_SERVER].example.internal"
          oracle_port: 1521
          oracle_database: DEVDB01
          oracle_service: DEVDB01
          oracle_version: "23c"
          database_platform: oracle

        # Oracle 12c (legacy)
        LEGACYDB_ORASERVER03:
          oracle_server: "[DB_SERVER].example.internal"
          oracle_port: 1521
          oracle_database: LEGACYDB
          oracle_service: LEGACYDB
          oracle_version: "12c"
          database_platform: oracle

        # Oracle 21c
        REPORTDB_ORASERVER04:
          oracle_server: "[DB_SERVER].example.internal"
          oracle_port: 1521
          oracle_database: REPORTDB
          oracle_service: REPORTDB
          oracle_version: "21c"
          database_platform: oracle
