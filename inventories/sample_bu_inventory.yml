---
# Sample env-level inventory - Database Compliance Scanning
#
# Layout: technology groups (mssql_databases / oracle_databases /
# sybase_databases) each own PLATFORM-SPECIFIC per-BU subgroups
# (db_<bu>_mssql, db_<bu>_oracle, db_<bu>_sybase). A top-level
# db_<bu> aggregator holds the BU-wide vars and children-refs the
# per-platform subgroups so `--limit db_<bu>` still targets every
# host for a BU across platforms.
#
# No per-host database_platform -- the platform is implicit from
# the parent tech group.
#
# Why platform-specific subgroup names: Ansible inventory YAML
# treats group names as global keys. Repeating a plain `db_<bu>`
# under every tech group merges every host list into one group and
# leaks hosts across platforms (mssql_databases ends up with Oracle
# hosts, etc.). Platform-specific subgroup names avoid the collision.
#
# Usage:
#   ansible-playbook test_playbooks/run_mssql_inspec.yml \
#     -i inventories/sample_bu_inventory.yml
#
#   # Target one BU across all platforms — uses the aggregator
#   ansible-playbook test_playbooks/run_oracle_inspec.yml \
#     -i inventories/sample_bu_inventory.yml --limit db_alpha
#
#   # Target one BU + one platform directly
#   ansible-playbook test_playbooks/run_mssql_inspec.yml \
#     -i inventories/sample_bu_inventory.yml --limit db_alpha_mssql

all:
  children:
    # ============================================================
    # BU aggregator groups (top-level) — hold BU-wide vars,
    # children-ref the per-platform subgroups.
    # ============================================================
    db_alpha:
      vars:
        ssc_sn_environment: test
        ssc_sn_region: na
        ssc_sn_bu: alpha
        ansible_connection: local
        inspec_delegate_host: "[DELEGATE_HOST]"
      children:
        db_alpha_mssql:
        db_alpha_oracle:
        db_alpha_sybase:

    db_bravo:
      vars:
        ssc_sn_environment: test
        ssc_sn_region: na
        ssc_sn_bu: bravo
        ansible_connection: local
        inspec_delegate_host: "[DELEGATE_HOST]"
      children:
        db_bravo_mssql:

    # ============================================================
    # MSSQL Servers (scanned at server level)
    # ============================================================
    mssql_databases:
      children:
        db_alpha_mssql:
          hosts:
            ALPHA_DBSERVER01_1433:
              mssql_server: "[DB_SERVER].example.internal"
              mssql_port: 1433
              mssql_version: "2019"
              mssql_username: nist_scan_user
              mssql_database: master
            ALPHA_DBSERVER02_1433:
              mssql_server: "[DB_SERVER].example.internal"
              mssql_port: 1433
              mssql_version: "2022"
              mssql_username: nist_scan_user
              mssql_database: master

        db_bravo_mssql:
          hosts:
            BRAVO_DBSERVER01_1433:
              mssql_server: "[DB_SERVER].example.internal"
              mssql_port: 1433
              mssql_version: "2017"
              mssql_username: nist_scan_user
              mssql_database: master

    # ============================================================
    # Oracle Databases (scanned per database/service)
    # ============================================================
    oracle_databases:
      children:
        db_alpha_oracle:
          hosts:
            ALPHA_CDB1_1521:
              oracle_server: "[DB_SERVER].example.internal"
              oracle_port: 1521
              oracle_service: CDB1
              oracle_version: "19"
              oracle_username: nist_scan_user

    # ============================================================
    # Sybase Databases (scanned per database)
    # ============================================================
    sybase_databases:
      children:
        db_alpha_sybase:
          hosts:
            ALPHA_SYBPROD01_5000:
              sybase_server: "[DB_SERVER].example.internal"
              sybase_port: 5000
              sybase_service: SYBPROD01
              sybase_version: "16"
              sybase_username: nist_scan_user
              sybase_database: master
