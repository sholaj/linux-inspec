---
# Sample Business Unit Inventory - Database Compliance Scanning
#
# Real inventories are generated from CMDB CSV exports and must NOT be committed.
# See: inventory_converter/README.md for usage instructions.
#
# Usage:
#   ansible-playbook test_playbooks/run_mssql_inspec.yml \
#     -i inventories/sample_bu_inventory.yml \
#     -e "host_group=mssql_databases" -e "target_bu=sample"

all:
  children:

    mssql_databases:
      vars:
        mssql_username: nist_scan_user
        mssql_database: master
        mssql_port: 1433
        business_unit: "[BU_ID]"
        ansible_connection: local

      hosts:
        DBSERVER01_1433:
          mssql_server: "[DB_SERVER].example.internal"
          mssql_version: "2019"

        DBSERVER02_1433:
          mssql_server: "[DB_SERVER].example.internal"
          mssql_version: "2022"

        DBSERVER03_51525:
          mssql_server: "[DB_SERVER].example.internal"
          mssql_port: 51525
          mssql_version: "2017"

    oracle_databases:
      vars:
        oracle_username: nist_scan_user
        oracle_port: 1521
        ansible_connection: local

      hosts:
        CDB1_ORASERVER01:
          oracle_server: "[DB_SERVER].example.internal"
          oracle_database: CDB1
          oracle_version: "19c"

        APPDB01_ORASERVER02:
          oracle_server: "[DB_SERVER].example.internal"
          oracle_database: APPDB01
          oracle_version: "23c"

        LEGACYDB_ORASERVER03:
          oracle_server: "[DB_SERVER].example.internal"
          oracle_database: LEGACYDB
          oracle_version: "12c"
