---
# Production Inventory - Database Compliance Scanning
# Credentials injected by AAP2 Custom Credential at runtime

all:
  # Delegate host (only needed for delegate mode)
  # Uncomment if InSpec runs on a remote bastion/jump server
  # hosts:
  #   inspec-runner:
  #     ansible_host: jumphost.example.com
  #     ansible_connection: ssh
  #     ansible_user: ansible_svc
  #     ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"

  children:
    # MSSQL Databases
    mssql_databases:
      hosts:
        # Example: Add your MSSQL servers here
        # SQLPROD01_1433:
        #   mssql_server: sqlprod01.example.com
        #   mssql_port: 1433
        #   mssql_version: "2019"
      vars:
        mssql_username: nist_scan_user
        # mssql_password: injected by AAP2 Custom Credential
        inspec_delegate_host: ""  # Empty = EE paths; set to delegate hostname for delegate paths
        inspec_results_dir: /tmp/inspec_mssql_results
        inspec_debug_mode: false
        generate_summary_report: true
        # Client tool paths auto-selected by execution mode:
        #   EE (localhost):  mssql_tools_paths_ee  → ["/usr/local/bin", "/opt/mssql-tools18/bin"]
        #   Delegate:        mssql_tools_paths_delegate → ["/usr/local/bin", "/opt/mssql-tools18/bin", "/opt/mssql-tools/bin"]
        # Override either default or force a specific path list:
        # mssql_tools_paths_delegate:
        #   - "/opt/mssql-tools18/bin"

    # Oracle Databases
    oracle_databases:
      hosts:
        # Example: Add your Oracle servers here
        # ORAPROD01_1521:
        #   oracle_server: oraprod01.example.com
        #   oracle_port: 1521
        #   oracle_service: ORCL
        #   oracle_version: "19"
      vars:
        oracle_username: nist_scan_user
        # oracle_password: injected by AAP2 Custom Credential
        inspec_delegate_host: ""
        # Client tool paths auto-selected by execution mode:
        #   EE (localhost):  oracle_home_ee       → /usr/lib/oracle/23/client64
        #   Delegate:        oracle_home_delegate → /tools/ver/oracle-client-21.3.0.0-32
        # Override if your environment differs:
        # oracle_home_delegate: "/tools/ver/oracle-client-21.3.0.0-32"

    # Sybase Databases
    sybase_databases:
      hosts:
        # Example: Add your Sybase servers here
        # SYBPROD01_5000:
        #   sybase_server: sybprod01.example.com
        #   sybase_port: 5000
        #   sybase_version: "16"
      vars:
        sybase_username: nist_scan_user
        sybase_use_ssh: true
        sybase_ssh_user: sybase_admin
        # sybase_password: injected by AAP2 Custom Credential
        inspec_delegate_host: ""
        # Client tool paths auto-selected by execution mode:
        #   EE (localhost):  sybase_home_ee       → /opt/sybase
        #   Delegate:        sybase_home_delegate → /tools/ver/sybase
        # Override if your environment differs:
        # sybase_home_delegate: "/opt/sap/ase"
        # sybase_ocs_delegate: "OCS_16_0"
