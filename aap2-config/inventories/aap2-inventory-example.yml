---
# AAP2 Compatible Inventory for Database Compliance Scanning
#
# INVENTORY STRUCTURE:
#   Production inventories are stored in the oar_tower_inventories repository
#   at env-level granularity (one file per ENV + REGION, containing corp
#   plus every affiliate). BU directory names in the public-facing repo use
#   NATO-phonetic placeholders (alpha, bravo, charlie, delta, echo); real BU
#   identifiers are not committed.
#
#   This file is an example template showing the required format.
#
# LAYOUT:
#   - Technology groups (mssql_databases / oracle_databases / sybase_databases
#     / postgres_databases) each own PLATFORM-SPECIFIC per-BU subgroups:
#         mssql_databases.children  -> db_<bu>_mssql
#         oracle_databases.children -> db_<bu>_oracle
#         sybase_databases.children -> db_<bu>_sybase
#         postgres_databases.children -> db_<bu>_postgres
#   - A top-level db_<bu> aggregator holds BU-wide vars and children-refs
#     the per-platform subgroups so `--limit db_<bu>` still targets every
#     host for that BU across platforms.
#   - No per-host database_platform -- platform is implicit from the parent
#     tech group. Each run_<plat>_inspec.yml playbook targets the matching
#     <plat>_databases group directly.
#
#   WHY NOT a single `db_<bu>` group as a direct child of all three tech
#   groups: Ansible inventory YAML treats group names as global keys.
#   Repeating `db_<bu>` under multiple tech groups merges every host list
#   into one group that then becomes a child of every tech group, polluting
#   `mssql_databases` with Oracle/Sybase hosts (and vice versa).
#
# CREDENTIALS:
#   NOT stored in this inventory - injected by AAP2 Custom Credentials
#
# CONTROLS:
#   InSpec profiles are pulled from the inspec_cis_database repository via
#   requirements.yml. AAP2 resolves them at project sync time.

all:
  vars:
    # Common settings for all database scans
    base_results_dir: /tmp/compliance_scans
    inspec_debug_mode: false
    generate_summary_report: true
    cleanup_temp_files: true

  children:
    # Delegate host for remote InSpec execution (optional).
    # Used when databases are only accessible from a jump server.
    delegate_hosts:
      hosts:
        inspec-runner:
          ansible_host: "[DELEGATE_HOST]"
          ansible_user: azureuser
          ansible_connection: ssh
          ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"

    # =========================================================================
    # BU aggregator groups (top-level) — hold BU-wide vars, aggregate
    # the per-platform subgroups so `--limit db_<bu>` still works.
    # =========================================================================
    db_alpha:
      vars:
        ssc_sn_environment: test
        ssc_sn_region: na
        ssc_sn_bu: alpha
        ansible_connection: local
        inspec_delegate_host: ""   # empty/localhost = run on EE
      children:
        db_alpha_mssql:
        db_alpha_oracle:
        db_alpha_sybase:
        db_alpha_postgres:

    db_bravo:
      vars:
        ssc_sn_environment: test
        ssc_sn_region: na
        ssc_sn_bu: bravo
        ansible_connection: local
        inspec_delegate_host: ""
      children:
        db_bravo_mssql:

    # =========================================================================
    # MSSQL (corp + affiliates)
    # =========================================================================
    mssql_databases:
      children:
        db_alpha_mssql:
          hosts:
            ALPHA_MSSQL01_1433:
              mssql_server: "[DB_SERVER].example.internal"
              mssql_port: 1433
              mssql_version: "2019"
              mssql_database: master

        db_bravo_mssql:
          hosts:
            BRAVO_MSSQL01_1433:
              mssql_server: "[DB_SERVER].example.internal"
              mssql_port: 1433
              mssql_version: "2022"
              mssql_database: master

    # =========================================================================
    # Oracle (corp only in this sample)
    # =========================================================================
    oracle_databases:
      children:
        db_alpha_oracle:
          hosts:
            ALPHA_ORCLCDB_1521:
              oracle_server: "[DB_SERVER].example.internal"
              oracle_port: 1521
              oracle_service: ORCLCDB
              oracle_version: "19"

    # =========================================================================
    # Sybase (corp only in this sample)
    # =========================================================================
    sybase_databases:
      children:
        db_alpha_sybase:
          hosts:
            ALPHA_MYSYBASE_5000:
              sybase_server: "[DB_SERVER].example.internal"
              sybase_port: 5000
              sybase_service: MYSYBASE
              sybase_database: master
              sybase_version: "16"
              sybase_use_ssh: false

    # =========================================================================
    # PostgreSQL (corp only in this sample)
    # =========================================================================
    postgres_databases:
      children:
        db_alpha_postgres:
          hosts:
            ALPHA_TESTDB_5432:
              postgres_server: "[DB_SERVER].example.internal"
              postgres_port: 5432
              postgres_database: testdb
              postgres_version: "15"
