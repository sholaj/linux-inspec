---
# AAP2 Compatible Inventory for Database Compliance Scanning
#
# INVENTORY STRUCTURE:
#   Production inventories are stored in the oar_tower_inventories repository,
#   organized by business unit (CORP, UATCORP, IMSWESTUAT, IMSWESTPROD, CRDIT).
#   This file is an example template showing the required format.
#
# KEY CHANGES (State Street workflow adoption):
#   - Groups are BU-based (db_corp, db_uatcorp) not technology-based (mssql_databases)
#   - Each host has 'database_platform' variable (mssql/oracle/sybase/postgres)
#   - Group vars include ssc_sn_environment, ssc_sn_region, ssc_sn_bu
#   - Playbooks use database_platform to determine which role to apply
#
# CREDENTIALS:
#   NOT stored in this inventory - they are injected by AAP2 Custom Credentials
#
# CONTROLS:
#   InSpec profiles are pulled from the inspec_cis_database repository via
#   requirements.yml. AAP2 resolves them at project sync time.

all:
  vars:
    # Common settings for all database scans
    base_results_dir: /tmp/compliance_scans
    inspec_debug_mode: false
    generate_summary_report: true
    cleanup_temp_files: true

  children:
    # Delegate host for remote InSpec execution (optional)
    # Use this when databases are only accessible from a jump server
    delegate_hosts:
      hosts:
        inspec-runner:
          ansible_host: "[DELEGATE_HOST]"
          ansible_user: azureuser
          ansible_connection: ssh
          ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"

    # =========================================================================
    # CORP Business Unit
    # =========================================================================
    db_corp:
      vars:
        ssc_sn_environment: test
        ssc_sn_region: na
        ssc_sn_bu: corp
        ansible_connection: local
        inspec_delegate_host: ""  # Empty or "localhost" = run on AAP2 execution node
        # Credentials injected by AAP2 Custom Credentials:
        # mssql_username, mssql_password, oracle_username, oracle_password, etc.
      hosts:
        # MSSQL Servers (scanned at server level)
        mssql_corp_01:
          database_platform: mssql
          mssql_server: "[DB_SERVER].example.internal"
          mssql_port: 1433
          mssql_version: "2019"
          mssql_database: master

        # Oracle Databases (scanned per database/service)
        oracle_corp_01:
          database_platform: oracle
          oracle_server: "[DB_SERVER].example.internal"
          oracle_port: 1521
          oracle_service: ORCLCDB
          oracle_version: "19"

        # Sybase Databases (scanned per database)
        sybase_corp_01:
          database_platform: sybase
          sybase_server: "[DB_SERVER].example.internal"
          sybase_port: 5000
          sybase_service: MYSYBASE
          sybase_database: master
          sybase_version: "16"
          sybase_use_ssh: false

        # PostgreSQL Databases (scanned per database)
        postgres_corp_01:
          database_platform: postgres
          postgres_server: "[DB_SERVER].example.internal"
          postgres_port: 5432
          postgres_database: testdb
          postgres_version: "15"

    # =========================================================================
    # UATCORP Business Unit
    # =========================================================================
    db_uatcorp:
      vars:
        ssc_sn_environment: test
        ssc_sn_region: na
        ssc_sn_bu: uatcorp
        ansible_connection: local
        inspec_delegate_host: ""
      hosts:
        mssql_uatcorp_01:
          database_platform: mssql
          mssql_server: "[DB_SERVER].example.internal"
          mssql_port: 1433
          mssql_version: "2022"
          mssql_database: master

    # =========================================================================
    # Legacy compatibility: technology-based groups (deprecated)
    # These groups reference the BU groups above for backward compatibility
    # with existing job templates during migration. Remove after full rollout.
    # =========================================================================
    mssql_databases:
      children:
        db_corp:
        db_uatcorp:

    oracle_databases:
      children:
        db_corp:

    sybase_databases:
      children:
        db_corp:

    postgres_databases:
      children:
        db_corp:
