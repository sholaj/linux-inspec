---
# Unified Compliance Test Playbook - All Databases
# =================================================
# Runs MSSQL, Oracle, and Sybase InSpec scans by importing the three
# per-platform playbooks. Platform is implicit from inventory groups
# (mssql_databases / oracle_databases / sybase_databases) — there is no
# per-host database_platform dispatch variable.
#
# Usage (localhost mode — default):
#   ansible-playbook -i inventories/hosts.yml test_playbooks/run_all_compliance.yml
#
# Usage (delegate mode — run InSpec on the runner VM):
#   ansible-playbook -i inventories/hosts.yml test_playbooks/run_all_compliance.yml \
#     -e "inspec_delegate_host=inspec-runner"
#
# Required Environment Variables:
#   MSSQL_PASSWORD, ORACLE_PASSWORD, SYBASE_PASSWORD

- name: MSSQL compliance scans
  ansible.builtin.import_playbook: run_mssql_inspec.yml

- name: Oracle compliance scans
  ansible.builtin.import_playbook: run_oracle_inspec.yml

- name: Sybase compliance scans
  ansible.builtin.import_playbook: run_sybase_inspec.yml

- name: "=== CONSOLIDATED COMPLIANCE SCAN SUMMARY ==="
  hosts: localhost
  gather_facts: false
  vars:
    base_results_dir: "{{ override_results_dir | default('/tmp/compliance_scans') }}"
    _summary_delegate_host: "{{ inspec_delegate_host if (inspec_delegate_host | default('')) not in ['', 'localhost'] else 'localhost' }}"
  tasks:
    - name: Collect all JSON result files
      ansible.builtin.find:
        paths: "{{ base_results_dir }}"
        patterns: "*.json"
        recurse: true
      register: all_result_files
      delegate_to: "{{ _summary_delegate_host }}"

    - name: Count results by platform
      ansible.builtin.set_fact:
        mssql_results: "{{ all_result_files.files | map(attribute='path') | map('basename') | select('match', '^MSSQL_NIST_') | list | length }}"
        oracle_results: "{{ all_result_files.files | map(attribute='path') | map('basename') | select('match', '^ORACLE_NIST_') | list | length }}"
        sybase_results: "{{ all_result_files.files | map(attribute='path') | map('basename') | select('match', '^SYBASE_NIST_') | list | length }}"

    - name: Display consolidated summary
      ansible.builtin.debug:
        msg: |
          =====================================================
          Multi-Platform Compliance Scan Complete
          =====================================================
          MSSQL result files:   {{ mssql_results }}
          Oracle result files:  {{ oracle_results }}
          Sybase result files:  {{ sybase_results }}
          -----------------------------------------------------
          Total result files:   {{ all_result_files.files | length }}
          Results location:     {{ base_results_dir }}
          Execution target:     {{ _summary_delegate_host }}

          To view results by platform:
            find {{ base_results_dir }}/ -name "MSSQL_NIST_*.json"
            find {{ base_results_dir }}/ -name "ORACLE_NIST_*.json"
            find {{ base_results_dir }}/ -name "SYBASE_NIST_*.json"
          =====================================================
