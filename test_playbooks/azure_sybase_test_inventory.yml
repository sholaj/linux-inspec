---
# Azure Sybase Test Inventory
# For testing sybase_inspec role against Azure container infrastructure

all:
  vars:
    # Global settings
    base_results_dir: /home/azureuser/compliance_scans
    enable_debug: true

    # Delegate host - the Azure runner VM runs InSpec
    inspec_delegate_host: "runner_vm"

    # Sybase environment on runner VM
    # Note: Sybase client (isql) must be installed on runner
    # Override paths for the Azure test environment (runner VM is the delegate)
    sybase_home: "/opt/sybase"
    sybase_ocs: "OCS-16_0"

  children:
    # Delegate hosts - where InSpec runs
    delegate_hosts:
      hosts:
        runner_vm:
          ansible_host: 127.0.0.1
          ansible_user: azureuser
          ansible_python_interpreter: /usr/bin/python3.9
          ansible_connection: local

    # Sybase databases to scan
    sybase_databases:
      hosts:
        sybase_azure_test:
          # Connection parameters
          sybase_server: 10.0.2.5
          sybase_port: 5000
          sybase_database: master
          sybase_service: MYSYBASE
          sybase_version: "16"
          sybase_username: sa
          sybase_password: "SybaseP@ss2024!"

          # Direct mode (default) - no SSH needed
          sybase_use_ssh: false

          # Delegate execution
          ansible_connection: local
