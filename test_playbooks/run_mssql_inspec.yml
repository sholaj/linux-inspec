---
# MSSQL InSpec Compliance Scanning Playbook
# Compatible with Ansible Automation Platform (AAP)
#
# Connection model: direct sqlcmd from the InSpec execution host (delegate or
# local). For WinRM-based MSSQL scans see run_mssql_inspec_winrm.yml.
#
# Inventory contract (per host):
#   (platform is implicit from the hosts: mssql_databases group target)
#   mssql_server, mssql_port, mssql_version, mssql_username, mssql_database
#   inspec_delegate_host  (group-level; "" or "localhost" = run on EE)

- name: Execute InSpec MSSQL Compliance Scans
  hosts: mssql_databases
  gather_facts: false
  strategy: "{{ execution_strategy | default('linear') }}"
  serial: "{{ batch_size | default(5) }}"

  vars:
    # NOTE: inspec_delegate_host comes from inventory group_vars (e.g., "inspec-runner").
    # Do NOT override here - it breaks the role's delegate-host connection lookup.
    scan_timestamp: "{{ controller_time.epoch | default(ansible_date_time.epoch) }}"
    enable_debug: false
    inspec_timeout: "{{ inspec_scan_timeout | default(1800) }}"  # 30 min/control
    base_results_dir: "{{ override_results_dir | default('/tmp/compliance_scans') }}"
    # AAP compatibility
    job_id: "{{ tower_job_id | default('local') }}"
    project_name: "{{ project_name | default('mssql_compliance') }}"
    # Splunk integration (handled by role's splunk_integration.yml)
    send_to_splunk: "{{ splunk_enabled | default(false) }}"
    splunk_hec_url: "{{ splunk_hec_url | default('') }}"
    splunk_hec_token: "{{ splunk_hec_token | default('') }}"
    splunk_index: "{{ splunk_index | default('compliance_scans') }}"

  pre_tasks:
    - name: Gather controller facts for timestamps
      ansible.builtin.setup:
        gather_subset:
          - min
      delegate_to: localhost
      run_once: true
      register: controller_facts

    - name: Set controller time fact
      ansible.builtin.set_fact:
        controller_time: "{{ controller_facts.ansible_facts.ansible_date_time }}"
      run_once: true

    # Compute safe delegate target per host (same logic as the role)
    - name: Determine execution target for pre-tasks
      ansible.builtin.set_fact:
        _playbook_delegate_host: "{{ inspec_delegate_host if (inspec_delegate_host | default('')) not in ['', 'localhost'] else 'localhost' }}"

    - name: Ensure base results directory exists
      ansible.builtin.file:
        path: "{{ base_results_dir }}"
        state: directory
        mode: "0755"
      delegate_to: "{{ _playbook_delegate_host }}"

    - name: Display MSSQL scan configuration
      ansible.builtin.debug:
        msg: |
          MSSQL InSpec Compliance Scans Starting
          ===========================================
          Total MSSQL hosts: {{ ansible_play_hosts | length }}
          Execution target: {{ _playbook_delegate_host }}
          Results directory: {{ base_results_dir }}
          Timestamp: {{ scan_timestamp }}
          Debug mode: {{ enable_debug }}
          Batch size: {{ batch_size | default(5) }}
      run_once: true
      when: enable_debug | bool

  tasks:
    - name: Display current MSSQL server being scanned
      ansible.builtin.debug:
        msg: "🔍 Scanning MSSQL {{ mssql_server }}:{{ mssql_port }} (version {{ mssql_version }}) - server-level scan"
      when: enable_debug | bool

    - name: Execute MSSQL InSpec compliance scan for server
      ansible.builtin.include_role:
        name: mssql_inspec
      vars:
        # Connection parameters (mssql_server, mssql_port, mssql_version,
        # mssql_username, mssql_password, mssql_database) come from inventory
        # host vars; credentials are injected by AAP2 Custom Credentials.
        inspec_results_dir: "{{ base_results_dir }}/{{ mssql_server | replace('.', '_') }}_{{ mssql_port }}_{{ scan_timestamp }}"
        inspec_debug_mode: "{{ enable_debug | default(false) }}"
        generate_summary_report: true
        inspec_command_timeout: "{{ inspec_timeout }}"

  post_tasks:
    - name: Generate MSSQL consolidated report
      block:
        - name: Find all MSSQL JSON result files
          ansible.builtin.find:
            paths: "{{ base_results_dir }}"
            patterns: "MSSQL_NIST_*.json"
            recurse: true
          register: mssql_json_files
          delegate_to: "{{ _playbook_delegate_host }}"
          run_once: true

        - name: Display MSSQL scan completion summary
          ansible.builtin.debug:
            msg: |
              =====================================
              MSSQL Compliance Scan Complete
              =====================================
              Total MSSQL hosts scanned: {{ ansible_play_hosts | length }}
              Result files generated: {{ mssql_json_files.files | length }}
              Results location: {{ base_results_dir }}

              To view results:
              find {{ base_results_dir }}/ -name "MSSQL_NIST_*.json"
              =====================================
          run_once: true
      when: not ansible_check_mode

# Example usage:
# POC mode:
#   ansible-playbook -i inventory.yml run_mssql_inspec.yml \
#     -e @mssql_vault.yml --vault-password-file .vaultpass
#
# AAP mode:
#   - Upload BU inventory as inventory source
#   - Add MSSQL Custom Credential (mssql_username, mssql_password)
#   - Add Splunk Custom Credential (optional) and set splunk_enabled=true
#
# Limit examples:
#   --limit "db_alpha"                   # One BU (aggregator, all platforms;
#                                        # intersected with hosts: mssql_databases)
#   --limit "db_alpha_mssql"             # One BU + this platform, directly
#   --limit "db_alpha:db_bravo"          # Two BUs
#   -e "enable_debug=true"               # Verbose output
