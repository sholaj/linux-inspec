---
# MSSQL InSpec Compliance Scanning Playbook
# Compatible with Ansible Automation Platform (AAP)
- name: Execute InSpec MSSQL Compliance Scans
  hosts: "{{ host_group }}"
  gather_facts: false
  connection: local
  strategy: "{{ execution_strategy | default('linear') }}"
  serial: "{{ batch_size | default(5) }}"

  vars:
    # Global settings - can be overridden by AAP extra vars
    inspec_delegate_host: "{{ delegate_host }}"
    scan_timestamp: "{{ controller_time.epoch | default(ansible_date_time.epoch) }}"
    enable_debug: "{{ debug_mode }}"
    # BU-specific: connect via SSH tunnel to localhost; otherwise use inventory host vars
    mssql_server: "{{ 'localhost' if business_unit == target_bu else db_server }}"
    mssql_port: "{{ ansible_port if business_unit == target_bu else db_port }}"
    mssql_version: "{{ db_version }}"
    base_results_dir: "/tmp"
    results_dir: "{{ base_results_dir }}/{{ mssql_server | replace('.', '_') }}_{{ mssql_version }}_{{ scan_timestamp }}"
    json_file_path: "{{ inventory_hostname }}_{{ db_port }}_{{ scan_timestamp }}.json"
    # Timeout settings for lengthy scans
    inspec_timeout: "{{ inspec_scan_timeout | default(1800) }}" # Default 30 minutes per control
    async_timeout: "{{ async_scan_timeout | default(3600) }}" # Default 1 hour for async execution
    poll_interval: "{{ async_poll_interval | default(30) }}" # Check status every 30 seconds
    # AAP compatibility
    job_id: "{{ tower_job_id | default('local') }}"
    project_name: "{{ project_name | default('mssql_compliance') }}"
    # Splunk integration
    send_to_splunk: "{{ splunk_enabled | default(false) }}"

  pre_tasks:

      # Please note, ansible_host is configured to 127.0.0.1 for the [BU_NAME] inventory group variables
    - name: "[BU_NAME] | Create SSH tunnel for each host"
      include_tasks:
        file: "{{ requirements_roles_dir }}/cis_win/ssh_tunnel_bu/tasks/open_tunnel.yml"
      vars:
        target_port: "{{ winrm_port }}"
        requirements_roles_dir: "{{ ('/runner/requirements_roles' if lookup('env', 'DESCRIPTION') is defined and 'Red Hat Ansible Automation Platform' in lookup('env', 'DESCRIPTION') else lookup('env', 'AWX_PRIVATE_DATA_DIR') + '/requirements_roles') }}"
      when: business_unit == target_bu
      tags: ["inspec_exec_db"]

    - name: Test SSH network port connectivity to {{ ansible_port }}
      wait_for:
        host: "localhost"
        port: "{{ ansible_port }}"
        state: started
        timeout: 10
      ignore_errors: yes
      delegate_to: localhost
      tags: ["inspec_exec_db"]

    - name: Display scan configuration
      debug:
        msg: |
          Starting MSSQL Compliance Scans
          ================================
          Total servers in group: {{ groups['mssql_databases'] | length }}
          Results directory: {{ base_results_dir }}
          Timestamp: {{ scan_timestamp }}
          Debug mode: {{ enable_debug }}
          Batch size: {{ batch_size | default(5) }}
      run_once: true
      when: enable_debug
      tags: ["inspec_exec_db"]

  tasks:
    - name: Display current server being scanned
      debug:
        msg: "Scanning {{ mssql_server }}:{{ mssql_port }}-({{ mssql_version }}) - Server-level scan"
      when: enable_debug
      tags: ["inspec_exec_db"]

    - name: Execute MSSQL InSpec compliance scan for server
      include_role:
        name: mssql_inspec
      vars:
        # Pass all server-specific variables from inventory host
        inspec_results_dir: "{{ results_dir }}"
        _result_file: "{{ json_file_path }}"
        inspec_debug_mode: "{{ enable_debug | default(false) }}"
        generate_summary_report: true
        inspec_command_timeout: "{{ inspec_timeout }}"
        # Server connection parameters come from inventory host variables:
        # mssql_server, mssql_port, mssql_version, mssql_username, mssql_password
        # Note: InSpec scans all databases on the server, not individual databases
      tags: ["inspec_exec_db"]

    - name: Send InSpec scan results to Splunk
      include_role:
        name: splunk_ingest
        tasks_from: splunk_ingest.yml
      vars:
        event: "{{ lookup('file', results_dir + '/' + json_file_path) }}"
      tags: ["inspec_exec_db"]

  post_tasks:
    - name: Generate consolidated report
      block:
        - name: Find all JSON result files
          find:
            paths: "{{ base_results_dir }}"
            patterns: "*.json"
            recurse: yes
          register: json_files
          delegate_to: "{{ inspec_delegate_host }}"
          run_once: true

        - name: Display scan completion summary
          debug:
            msg: |
              =====================================
              MSSQL Compliance Scan Complete
              =====================================
              Total servers scanned: {{ groups['mssql_databases'] | length }}
              Result files generated: {{ json_files.files | length }}
              Results location: {{ base_results_dir }}
          run_once: true
